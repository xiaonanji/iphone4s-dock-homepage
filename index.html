<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>Desk Display</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen">
    <div class="backdrop"></div>
    <div class="display-shell">
      <main class="display" id="display" role="main" aria-label="Desk clock display">
        <section class="time-panel" aria-label="Local time and date">
          <div class="topline">
            <span class="badge">Desk Mode</span>
            <span class="badge badge-subtle" id="weather-status">Weather refresh pending</span>
          </div>

          <div class="clock-wrap">
            <div class="clock-main">
              <span id="clock-hours">00</span>
              <span class="clock-separator" aria-hidden="true">:</span>
              <span id="clock-minutes">00</span>
            </div>
            <div class="clock-seconds" id="clock-seconds">00</div>
          </div>

          <div class="date-line" id="date-line">Monday, 10 April 2026</div>
        </section>

        <aside class="weather-panel" aria-label="Weather">
          <div class="weather-location" id="weather-location">Sydney</div>
          <div class="weather-condition" id="weather-condition">Loading weather</div>

          <div class="weather-temp-row">
            <div class="weather-temp" id="weather-temp">--&deg;</div>
            <div class="weather-feels">
              <div class="weather-label">Feels like</div>
              <div class="weather-value" id="weather-feels">--&deg;</div>
            </div>
          </div>

          <div class="weather-range">
            <div class="range-card">
              <div class="weather-label">High</div>
              <div class="weather-value" id="weather-high">--&deg;</div>
            </div>
            <div class="range-card">
              <div class="weather-label">Low</div>
              <div class="weather-value" id="weather-low">--&deg;</div>
            </div>
          </div>

          <div class="weather-meta" id="weather-updated">Waiting for first update</div>
        </aside>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
