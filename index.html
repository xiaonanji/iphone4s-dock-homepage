<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>Desk Display</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen">
    <div class="backdrop"></div>
    <div class="display-shell">
      <main class="display" id="display" role="main" aria-label="Desk clock display">
        <div class="clock-face">
          <header class="date-band" aria-label="Date">
            <div class="date-line" id="date-line">APR 10, 2026</div>
          </header>

          <section class="time-band" aria-label="Current time">
            <div class="clock-main">
              <span id="clock-hours">10</span>
              <span class="clock-separator" aria-hidden="true">:</span>
              <span id="clock-minutes">58</span>
            </div>
          </section>

          <footer class="bottom-band" aria-label="Weekday and weather">
            <div class="weekday-block" id="weekday-line">THU</div>

            <div class="weather-block">
              <div class="weather-icon" id="weather-icon" aria-hidden="true"></div>
              <div class="weather-condition" id="weather-condition">Cloudy</div>
            </div>

            <div class="temperature-block">
              <div class="temperature-now" id="weather-temp">24&deg;C</div>
              <div class="weather-range" id="weather-range">18&deg; / 24&deg;</div>
            </div>
          </footer>
        </div>
        <div class="dog-strip" id="dog-strip" aria-hidden="true">
          <pre class="dog-sprite" id="dog-sprite"></pre>
          <div class="math-strip" id="math-strip">
            <div class="formula-label" id="formula-label"></div>
            <div class="formula-katex" id="formula-katex"></div>
          </div>
          <button class="strip-toggle" id="strip-toggle" title="Toggle formula / dog">&#8721;</button>
        </div>
      </main>
    </div>
  </div>

  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      messageStyle: "none",
      showProcessingMessages: false,
      showMathMenu: false,
      "HTML-CSS": {
        availableFonts: ["TeX"],
        webFont: "TeX",
        imageFont: null,
        scale: 85
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-AMS_HTML"></script>
  <script src="script.js"></script>
</body>
</html>
